<h2>Slots disponibles</h2>

<table>
    <tr>
        <th>Fecha</th>
        <th>Hora</th>
        <th>Acción</th>
    </tr>

    {% for slot in slots %}
    <tr>
        <td>{{ slot.fecha }}</td>
        <td>{{ slot.hora_inicio }} - {{ slot.hora_fin }}</td>
        <td>
            <a href="{% url 'agenda:reservar_turno' slot.id %}">
                Reservar
            </a>
        </td>
    </tr>
    {% endfor %}
</table>
