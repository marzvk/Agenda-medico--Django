{% extends "base.html" %}

{% block title %}Iniciar Sesión - MedAgenda{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="card shadow-sm" style="width: 100%; max-width: 400px; border-radius: 15px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <h2 class="fw-bold">🩺 MedAgenda</h2>
                <p class="text-muted">Ingresá tus credenciales</p>
            </div>
            
            <form method="post">
                {% csrf_token %}
                
                {% if form.errors %}
                <div class="alert alert-danger p-2 small">
                    Usuario o contraseña incorrectos.
                </div>
                {% endif %}

                <div class="mb-3">
                    <label for="id_username" class="form-label">Usuario</label>
                    <input type="text" name="username" class="form-control" id="id_username" required>
                </div>
                
                <div class="mb-4">
                    <label for="id_password" class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" id="id_password" required>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">Entrar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    /* Ocultamos el sidebar solo en la página de login para que quede centrado */
    #sidebar { display: none !important; }
    #content { width: 100% !important; background-color: #f4f7f6; }
</style>
{% endblock %}
